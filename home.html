<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Select Level</title>
    <style>
        :root {
            --primary-color: #4a148c;
            --secondary-color: #7b1fa2;
            --bg-color: #f3e5f5;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(74, 20, 140, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--primary-color);
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        p.welcome-user {
            color: var(--secondary-color);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .level-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .level-card {
            background-color: #faf0fc;
            border: 2px solid var(--secondary-color);
            color: var(--primary-color);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(123, 31, 162, 0.08);
        }

        .level-card:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(74, 20, 140, 0.25);
        }

        .level-card:active {
            transform: translateY(0);
        }

        .level-number {
            background: var(--secondary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .level-card:hover .level-number {
            background: white;
            color: var(--primary-color);
        }

        .logout-btn {
            margin-top: 30px;
            background: transparent;
            border: none;
            color: #777;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s ease;
        }

        .logout-btn:hover {
            color: var(--primary-color);
        }

        /* Responsive Layouts */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .container {
                padding: 28px 20px;
                border-radius: 16px;
            }
            h1 {
                font-size: 22px;
            }
            .level-card {
                padding: 14px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Select Level</h1>
        <p class="welcome-user" id="user-greeting">Welcome!</p>

        <div class="level-grid">
            <div class="level-card" onclick="selectLevel(1)">
                <span>Level 1 (Prarambhik)</span>
                <span class="level-number">1st</span>
            </div>

            <div class="level-card" onclick="selectLevel(2)">
                <span>Level 2 (Praveshika Pratham)</span>
                <span class="level-number">2nd</span>
            </div>

            <div class="level-card" onclick="selectLevel(3)">
                <span>Level 3 (Praveshika Purna)</span>
                <span class="level-number">3rd</span>
            </div>

            <div class="level-card" onclick="selectLevel(4)">
                <span>Level 4 (Madhyama Pratham)</span>
                <span class="level-number">4th</span>
            </div>

            <div class="level-card" onclick="selectLevel(5)">
                <span>Level 5 (Madhyama Purna)</span>
                <span class="level-number">5th</span>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        // Load the stored username from Login page
        const storedName = localStorage.getItem('currentLoggedInUser') || 'Musician';
        document.getElementById('user-greeting').innerText = `Welcome, ${storedName}! 👋`;

        function selectLevel(levelNum) {
            alert(`Level ${levelNum} selected!`);
            // You can redirect to the word search game or specific level page here later:
            // window.location.href = `game.html?level=${levelNum}`;
        }

        function logout() {
            localStorage.removeItem('currentLoggedInUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
