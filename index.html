<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Indian Music App</title>
    <style>
        :root {
            --primary-color: #4a148c;
            --secondary-color: #7b1fa2;
            --bg-color: #f3e5f5;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin: 0 0 8px 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: var(--secondary-color);
            margin: 0 0 25px 0;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: bold;
            color: var(--primary-color);
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
            outline: none;
            background-color: white;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--primary-color);
        }

        /* Responsive Row for Mobile DOB Selects */
        .dob-selects {
            display: flex;
            gap: 8px;
        }

        .dob-selects select {
            padding: 10px 6px;
        }

        button.login-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 20px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
        }

        button.login-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-1px);
        }

        .success-message {
            display: none;
            margin-top: 20px;
            padding: 12px;
            background-color: #e8f5e9;
            color: #2e7d32;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 20px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Welcome</h1>
        <p class="subtitle">Please enter your details to continue</p>

        <form id="login-form">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Date of Birth</label>
                <div class="dob-selects">
                    <select id="dob-day" required>
                        <option value="">Day</option>
                    </select>
                    <select id="dob-month" required>
                        <option value="">Month</option>
                        <option value="01">Jan</option>
                        <option value="02">Feb</option>
                        <option value="03">Mar</option>
                        <option value="04">Apr</option>
                        <option value="05">May</option>
                        <option value="06">Jun</option>
                        <option value="07">Jul</option>
                        <option value="08">Aug</option>
                        <option value="09">Sep</option>
                        <option value="10">Oct</option>
                        <option value="11">Nov</option>
                        <option value="12">Dec</option>
                    </select>
                    <select id="dob-year" required>
                        <option value="">Year</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="login-btn">Submit</button>
        </form>

        <div id="success-message" class="success-message">
            🎉 Welcome! Login successful.
        </div>
    </div>

    <script>
        // Populate Days (1 to 31)
        const daySelect = document.getElementById('dob-day');
        for (let i = 1; i <= 31; i++) {
            const val = i < 10 ? `0${i}` : i;
            daySelect.innerHTML += `<option value="${val}">${i}</option>`;
        }

        // Populate Years (1940 to Current Year)
        const yearSelect = document.getElementById('dob-year');
        const currentYear = new Date().getFullYear();
        for (let i = currentYear; i >= 1940; i--) {
            yearSelect.innerHTML += `<option value="${i}">${i}</option>`;
        }

        // Form Submit Handler
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const day = document.getElementById('dob-day').value;
            const month = document.getElementById('dob-month').value;
            const year = document.getElementById('dob-year').value;
            
            const dob = `${year}-${month}-${day}`;

            localStorage.setItem('userName', name);
            localStorage.setItem('userDOB', dob);

            document.getElementById('success-message').style.display = 'block';
        });
    </script>
</body>
</html>
