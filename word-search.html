<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Search - Praveshika Pratham</title>
    <style>
        :root {
            --primary-color: #4a148c;
            --secondary-color: #7b1fa2;
            --bg-color: #f3e5f5;
            --accent-green: #2e7d32;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(74, 20, 140, 0.15);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--secondary-color);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Category Tabs (Raag / Taal) */
        .category-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0 20px 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid var(--primary-color);
            background-color: white;
            color: var(--primary-color);
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* Completion Status Badge */
        .completion-badge {
            display: inline-block;
            background-color: #e8f5e9;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .completion-badge.hidden {
            display: none;
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 3px;
            margin: 15px 0;
            user-select: none;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: #faf0fc;
            border: 1px solid #e1bee7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
        }

        .grid-cell.selected {
            background: #ba68c8;
            color: white;
        }

        .grid-cell.found {
            background: #4caf50;
            color: white;
        }

        /* Word List */
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .word-item {
            background: #f3e5f5;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .word-item.found {
            text-decoration: line-through;
            opacity: 0.5;
            background: #e8f5e9;
            color: var(--accent-green);
        }

        .action-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .action-btn:hover {
            background-color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <button class="back-btn" onclick="goBack()">⬅ Back</button>
            <span id="level-indicator" style="font-size: 12px; font-weight: bold; color: #666;"></span>
        </div>

        <h1 id="puzzle-title">Word Search</h1>
        
        <!-- Category Option Tabs -->
        <div class="category-tabs">
            <button class="tab-btn active" id="tab-raag" onclick="switchCategory('raag')">🎵 Raag</button>
            <button class="tab-btn" id="tab-taal" onclick="switchCategory('taal')">🥁 Taal</button>
        </div>

        <!-- Completion Indicator -->
        <div id="completion-status" class="completion-badge hidden">
            ✔ Completed! You can reattempt anytime.
        </div>

        <!-- Word Search Grid -->
        <div id="grid" class="grid-container"></div>

        <!-- Target Words -->
        <div id="word-list" class="word-list"></div>

        <button class="action-btn" onclick="resetCurrentPuzzle()">🔄 Reset / Reattempt</button>
    </div>

    <script>
        // 1. Data Store for Puzzles (Level + Category)
        const puzzleData = {
            '2': { // Level 2 (Praveshika Pratham)
                'raag': {
                    title: "Raagas of Praveshika Pratham",
                    words: ["DURGA", "DES", "BHOOP", "KAAFI", "BHIMPALASI", "BAGESHREE", "KHAMA AJ", "YAMAN"],
                    grid: [
                        ['S','M','U','S','L','K','F','W','M','S','P','O','O','H','B'],
                        ['L','T','X','Y','A','M','Y','I','E','D','O','F','E','O','T'],
                        ['S','A','H','A','A','H','J','M','A','D','B','I','L','Y','F'],
                        ['E','X','F','A','A','V','U','L','R','S','U','Q','I','P','N'],
                        ['D','I','K','U','N','V','A','B','B','N','R','R','A','T','J'],
                        ['R','C','G','I','N','K','U','N','A','C','V','N','G','D','W'],
                        ['J','L','K','S','B','S','S','U','G','A','I','E','E','A','I'],
                        ['J','P','C','A','T','W','C','G','E','R','S','E','R','H','J'],
                        ['Z','V','B','L','K','C','R','F','S','V','A','Z','N','O','P'],
                        ['S','P','R','A','I','N','O','K','H','A','M','A','A','J','K'],
                        ['N','S','G','P','A','R','S','F','R','F','I','C','P','P','B'],
                        ['F','R','I','M','A','Y','Z','S','E','R','S','N','N','I','N'],
                        ['D','D','A','I','K','Y','L','F','E','L','Q','A','G','N','V'],
                        ['T','Y','U','H','C','S','I','D','C','S','Z','Y','V','G','H'],
                        ['C','L','E','B','R','A','N','C','J','K','N','H','R','I','R']
                    ]
                },
                'taal': {
                    title: "Taalas of Praveshika Pratham",
                    words: ["DADRA", "KEHRAVA", "EKTAAL", "TEENTAAL", "JHAPTAAL", "CHAUTAAL"],
                    grid: [
                        ['R','M','Y','S','C','A','F','I','I','N','A','N','E','N','Z'],
                        ['M','S','K','W','S','P','S','H','U','O','L','O','M','L','F'],
                        ['D','A','D','R','A','Q','D','N','A','V','K','G','E','A','L'],
                        ['T','Y','M','I','D','O','L','O','X','F','A','E','E','A','Y'],
                        ['S','P','R','F','F','I','N','P','G','N','L','P','R','T','S'],
                        ['A','A','H','M','D','B','S','Y','H','A','A','L','A','P','J'],
                        ['X','A','V','L','S','U','E','P','A','G','K','I','R','A','U'],
                        ['P','A','N','K','A','M','S','T','R','T','I','A','H','H','O'],
                        ['I','U','V','E','N','R','K','T','E','F','N','A','B','J','A'],
                        ['Y','H','S','H','S','E','T','G','U','E','C','V','C','H','I'],
                        ['C','I','K','R','C','V','R','D','G','N','N','G','A','W','U'],
                        ['L','S','S','A','A','I','J','A','K','E','B','T','G','I','S'],
                        ['V','L','C','V','V','A','Z','O','B','Z','K','N','A','P','R'],
                        ['L','B','A','A','K','N','C','I','E','H','R','R','J','A','N'],
                        ['P','L','A','A','T','U','A','H','C','A','T','R','E','J','L']
                    ]
                }
            }
        };

        // Get Current Level from URL or localStorage (Defaults to Level 2)
        const urlParams = new URLSearchParams(window.location.search);
        const currentLevel = urlParams.get('level') || localStorage.getItem('activeLevel') || '2';
        let currentCategory = 'raag';

        document.getElementById('level-indicator').innerText = `Level ${currentLevel}`;

        // Initialize Screen
        function loadPuzzle() {
            const data = puzzleData[currentLevel]?.[currentCategory];
            if (!data) return;

            document.getElementById('puzzle-title').innerText = data.title;
            
            // Check Completion Status in LocalStorage
            const completionKey = `completed_L${currentLevel}_${currentCategory}`;
            const isCompleted = localStorage.getItem(completionKey) === 'true';

            const statusBadge = document.getElementById('completion-status');
            if (isCompleted) {
                statusBadge.classList.remove('hidden');
            } else {
                statusBadge.classList.add('hidden');
            }

            // Render Grid
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            data.grid.forEach((row, r) => {
                row.forEach((letter, c) => {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.innerText = letter;
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    gridEl.appendChild(cell);
                });
            });

            // Render Words
            const wordListEl = document.getElementById('word-list');
            wordListEl.innerHTML = '';
            data.words.forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerText = word;
                item.id = `word-${word.replace(/\s+/g, '')}`;
                wordListEl.appendChild(item);
            });
        }

        // Switch Tabs (Raag vs Taal)
        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${cat}`).classList.add('active');
            loadPuzzle();
        }

        // Mark completed and offer reattempt
        function markAsComplete() {
            const completionKey = `completed_L${currentLevel}_${currentCategory}`;
            localStorage.setItem(completionKey, 'true');
            loadPuzzle();
        }

        // Reset/Reattempt
        function resetCurrentPuzzle() {
            loadPuzzle();
        }

        function goBack() {
            window.location.href = 'home.html';
        }

        // Initial Load
        loadPuzzle();
    </script>
</body>
</html>
